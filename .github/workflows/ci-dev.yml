name: Main Branch CI
run-name: ${{ github.head_ref || github.ref_name }}-ci-dev

on:
    push:
        branches:
            - main
        paths-ignore:
            - "**.yml"
            - "**.jpg"
            - "**.png"
            - "**.md"
    workflow_dispatch:

concurrency:
    group: ci-dev-${{ github.event.number }}
    cancel-in-progress: true

jobs:
    unit-tests:
        strategy:
            fail-fast: false
            max-parallel: 10
            matrix:
                godot-version: [4.6.1]

        name: "CI on Godot 🐧 v${{ matrix.godot-version }}"
        uses: ./.github/workflows/unit-tests.yml
        with:
            godot-version: ${{ matrix.godot-version }}
