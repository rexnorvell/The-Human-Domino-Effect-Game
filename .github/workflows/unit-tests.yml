name: Unit Tests
run-name: ${{ github.head_ref || github.ref_name }}-unit-tests

on:
    workflow_call:
        inputs:
            os:
                required: false
                type: string
                default: "ubuntu-22.04"
            godot-version:
                required: true
                type: string

    workflow_dispatch:
        inputs:
            os:
                required: false
                type: string
                default: "ubuntu-22.04"
            godot-version:
                required: true
                type: string

concurrency:
    group: unit-tests-${{ github.head_ref || github.ref_name }}-${{ inputs.godot-version }}
    cancel-in-progress: true

jobs:
    unit-test:
        name: "Unit Tests"
        runs-on: ${{ inputs.os }}
        timeout-minutes: 15

        steps:
            - name: "Checkout GdUnit Repository"
              uses: actions/checkout@v6
              with:
                  lfs: true
                  submodules: "recursive"

            - name: "Install Godot ${{ inputs.godot-version }}"
              uses: ./.github/actions/godot-install
              with:
                  godot-version: ${{ inputs.godot-version }}
                  godot-mono: false
                  godot-status-version: "stable"
                  godot-bin-name: "x11.64"
                  godot-cache-path: "~/godot-linux"

            - name: "Update Project"
              if: ${{ !cancelled() }}
              timeout-minutes: 1
              continue-on-error: true
              shell: bash
              run: |
                "$HOME/godot-linux/godot" --headless --import --path .

            - name: "Run Unit Tests"
              if: ${{ !cancelled() }}
              timeout-minutes: 8
              uses: ./.github/actions/unit-test
              with:
                  godot-bin: /home/runner/godot-linux/godot
                  test-includes: "res://test/"

            - name: "Set Report Name"
              if: ${{ always() }}
              shell: bash
              run: echo "REPORT_NAME=${{ inputs.os }}-${{ inputs.godot-version }}" >> "$GITHUB_ENV"

            - name: "Publish Unit Test Reports"
              if: ${{ !cancelled() }}
              uses: ./.github/actions/publish-test-report
              continue-on-error: true # TODO: Some outstanding permission issues prevent reports from being published at the moment. Will *hopefully* be fixed once repository is migrated.
              with:
                  report-name: ${{ env.REPORT_NAME }}

            - name: "Upload Unit Test Reports"
              if: ${{ !cancelled() }}
              uses: ./.github/actions/upload-test-report
              with:
                  report-name: ${{ env.REPORT_NAME }}
